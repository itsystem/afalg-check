name: Go

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build release binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o itsumma-afalg-check-linux-amd64 .

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: itsumma-afalg-check-linux-amd64
